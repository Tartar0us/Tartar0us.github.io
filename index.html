<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的简单网站</title>
    <link rel="stylesheet" href="styles.css"> <!-- 引入CSS文件 -->
</head>
<body>
    <header>
        <img src="images/logo.png" alt="网站Logo" width="100"> <!-- 引用图片 -->
        <h1>欢迎来到我的网站</h1>
    </header>
    <main>
        <p>这是一个简单的静态网站，希望你喜欢！</p>
        <button onclick="alert('你好，世界！')">点击我</button> <!-- 简单的交互 -->
    </main>
    <footer>
        <p>&copy; 2025 我的网站</p>
    </footer>
</body>
</html>
